                '亥': [{'干':'壬', '权重':0.7}, {'干':'甲', '权重':0.3}]
            };
            
            // 五行生克关系
            const SHENG = { '木': '火', '火': '土', '土': '金', '金': '水', '水': '木' };
            const KE = { '木': '土', '火': '金', '土': '水', '金': '木', '水': '火' };
            
            // 阴阳属性 (0为阴, 1为阳)
            const YIN_YANG = {
                '甲': 1, '乙': 0, '丙': 1, '丁': 0, '戊': 1,
                '己': 0, '庚': 1, '辛': 0, '壬': 1, '癸': 0
            };
            
            // ---------- 城市经度数据 ----------
            const CITY_LONGITUDE = {
                '北京': 116.40, '上海': 121.47, '广州': 113.23, '深圳': 114.07, '成都': 104.07,
                '重庆': 106.55, '武汉': 114.31, '西安': 108.95, '南京': 118.78, '杭州': 120.15,
                '天津': 117.20, '沈阳': 123.43, '长春': 125.35, '哈尔滨': 126.63, '济南': 117.00,
                '青岛': 120.33, '郑州': 113.65, '长沙': 112.98, '南昌': 115.89, '合肥': 117.27,
                '福州': 119.30, '厦门': 118.10, '台北': 121.52, '香港': 114.17, '澳门': 113.55,
                '南宁': 108.33, '海口': 110.35, '贵阳': 106.71, '昆明': 102.73, '拉萨': 91.11,
                '乌鲁木齐': 87.68, '呼和浩特': 111.65, '银川': 106.27, '西宁': 101.74, '兰州': 103.73,
                '太原': 112.56, '石家庄': 114.48, '大连': 121.62, '宁波': 121.55, '苏州': 120.58,
                '无锡': 120.29, '佛山': 113.12, '东莞': 113.75, '中山': 113.38, '珠海': 113.52
            };
            
            // ---------- 日期验证函数 ----------
            function isValidDate(year, month, day) {
                const date = new Date(year, month - 1, day);
                return date.getFullYear() === year && 
                       date.getMonth() === month - 1 && 
                       date.getDate() === day;
            }
            
            // ---------- 真太阳时计算 ----------
            const TrueSolarTime = {
                getLongitude(city) {
                    if (!city) return 120.0;
                    if (CITY_LONGITUDE[city]) return CITY_LONGITUDE[city];
                    
                    // 模糊匹配
                    for (let key in CITY_LONGITUDE) {
                        if (city.includes(key) || key.includes(city)) {
                            return CITY_LONGITUDE[key];
                        }
                    }
                    return 120.0;
                },
                
                calculate(year, month, day, hour, minute, city, useSummerTime) {
                    const lon = this.getLongitude(city);
                    
                    // 夏令时校正
                    let h = hour;
                    if (useSummerTime) h -= 1;
                    
                    // 经度时差 (每度4分钟)
                    const diffMin = (lon - 120.0) * 4;
                    let totalMin = h * 60 + minute + diffMin;
                    
                    // 转换为日期
                    let newHour = Math.floor(totalMin / 60);
                    let newMinute = Math.round(totalMin % 60);
                    
                    if (newMinute >= 60) { newMinute -= 60; newHour++; }
                    if (newMinute < 0) { newMinute += 60; newHour--; }
                    
                    let newDay = day;
                    let newMonth = month;
                    let newYear = year;
                    
                    if (newHour >= 24) { newHour -= 24; newDay++; }
                    if (newHour < 0) { newHour += 24; newDay--; }
                    
                    // 处理月份边界
                    if (newDay > 28) {
                        const tempDate = new Date(newYear, newMonth - 1, newDay);
                        newYear = tempDate.getFullYear();
                        newMonth = tempDate.getMonth() + 1;
                        newDay = tempDate.getDate();
                    }
                    
                    // 时辰索引 (23:00-01:00为子时)
                    let hourIdx;
                    if (newHour >= 23 || newHour < 1) hourIdx = 0;      // 子
                    else if (newHour >= 1 && newHour < 3) hourIdx = 1;  // 丑
                    else if (newHour >= 3 && newHour < 5) hourIdx = 2;  // 寅
                    else if (newHour >= 5 && newHour < 7) hourIdx = 3;  // 卯
                    else if (newHour >= 7 && newHour < 9) hourIdx = 4;  // 辰
                    else if (newHour >= 9 && newHour < 11) hourIdx = 5; // 巳
                    else if (newHour >= 11 && newHour < 13) hourIdx = 6; // 午
                    else if (newHour >= 13 && newHour < 15) hourIdx = 7; // 未
                    else if (newHour >= 15 && newHour < 17) hourIdx = 8; // 申
                    else if (newHour >= 17 && newHour < 19) hourIdx = 9; // 酉
                    else if (newHour >= 19 && newHour < 21) hourIdx = 10; // 戌
                    else hourIdx = 11; // 亥
                    
                    const shichenList = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
                    
                    return {
                        year: newYear,
                        month: newMonth,
                        day: newDay,
                        hour: newHour,
                        minute: newMinute,
                        hourIndex: hourIdx,
                        shichen: shichenList[hourIdx] + '时',
                        shichenName: shichenList[hourIdx],
                        longitude: lon,
                        diffMin: diffMin,
                        city: city
                    };
                },
                
                // 夏令时检测 (1986-1991)
                isSummerTimeActive(year, month, day) {
                    if (year === 1986 && month === 5 && day >= 4) return true;
                    if (year === 1986 && month > 5 && month < 9) return true;
                    if (year === 1986 && month === 9 && day <= 14) return true;
                    
                    if (year >= 1987 && year <= 1991) {
                        if (month === 4 && day >= 12) return true;
                        if (month > 4 && month < 9) return true;
                        if (month === 9 && day <= 14) return true;
                    }
                    return false;
                }
            };
            
            // ---------- 十神计算 (修正版) ----------
            function getShiShen(dayGan, otherGan) {
                if (!dayGan || !otherGan) return '';
                
                const idx1 = TIAN_GAN.indexOf(dayGan);
                const idx2 = TIAN_GAN.indexOf(otherGan);
                if (idx1 === -1 || idx2 === -1) return '';
                
                const wx1 = GAN_WUXING[idx1]; // 日主五行
                const wx2 = GAN_WUXING[idx2]; // 其他天干五行
                const yy1 = YIN_YANG[dayGan];  // 日主阴阳
                const yy2 = YIN_YANG[otherGan]; // 其他天干阴阳
                
                // 同我者为比劫
                if (wx1 === wx2) {
                    return yy1 === yy2 ? '比肩' : '劫财';
                }
                
                // 我生者为食伤
                if (SHENG[wx1] === wx2) {
                    return yy1 === yy2 ? '食神' : '伤官';
                }
                
                // 生我者为印星
                if (SHENG[wx2] === wx1) {
                    return yy1 === yy2 ? '偏印' : '正印';
                }
                
                // 我克者为财星
                if (KE[wx1] === wx2) {
                    return yy1 === yy2 ? '偏财' : '正财';
                }
                
                // 克我者为官杀
                if (KE[wx2] === wx1) {
                    return yy1 === yy2 ? '七杀' : '正官';
                }
                
                return '';
            }
            
            // ---------- 计算五行分数 (考虑藏干权重) ----------
            function calculateWuXingScore(pillars) {
                const score = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
                
                // 天干计分 (权重1)
                [pillars.year.gan, pillars.month.gan, pillars.day.gan, pillars.hour.gan].forEach(gan => {
                    const idx = TIAN_GAN.indexOf(gan);
                    if (idx !== -1) {
                        score[GAN_WUXING[idx]] += 1.0;
                    }
                });
                
                // 地支藏干计分
                [pillars.year.zhi, pillars.month.zhi, pillars.day.zhi, pillars.hour.zhi].forEach(zhi => {
                    const cangGan = ZHI_CANG_GAN[zhi];
                    if (cangGan) {
                        cangGan.forEach(item => {
                            const idx = TIAN_GAN.indexOf(item.干);
                            if (idx !== -1) {
                                score[GAN_WUXING[idx]] += item.权重;
                            }
                        });
                    }
                });
                
                return score;
            }
            
            // ---------- 神煞计算 ----------
            function calculateShenSha(pillars) {
                const shensha = [];
                const dayGan = pillars.day.gan;
                const dayZhi = pillars.day.zhi;
                const yearZhi = pillars.year.zhi;
                
                // 天乙贵人
                const tianyiRules = {
                    '甲': ['丑', '未'], '戊': ['丑', '未'], '庚': ['丑', '未'],
                    '乙': ['子', '申'], '己': ['子', '申'],
                    '丙': ['亥', '酉'], '丁': ['亥', '酉'],
                    '壬': ['卯', '巳'], '癸': ['卯', '巳'],
                    '辛': ['寅', '午']
                };
                const tianyiTargets = tianyiRules[dayGan];
                if (tianyiTargets) {
                    if (tianyiTargets.includes(pillars.year.zhi) || tianyiTargets.includes(pillars.month.zhi) || 
                        tianyiTargets.includes(pillars.day.zhi) || tianyiTargets.includes(pillars.hour.zhi)) {
                        shensha.push('天乙贵人');
                    }
                }
                
                // 文昌贵人
                const wenchangMap = {
                    '甲': '巳', '乙': '午', '丙': '申', '丁': '酉', '戊': '申',
                    '己': '酉', '庚': '亥', '辛': '子', '壬': '寅', '癸': '卯'
                };
                const wenchangZhi = wenchangMap[dayGan];
                if ([pillars.year.zhi, pillars.month.zhi, pillars.day.zhi, pillars.hour.zhi].includes(wenchangZhi)) {
                    shensha.push('文昌贵人');
                }
                
                // 桃花 (咸池)
                const taoHuaZhi = ['子', '午', '卯', '酉'];
                if (taoHuaZhi.includes(pillars.year.zhi) || taoHuaZhi.includes(pillars.day.zhi)) {
                    shensha.push('桃花');
                }
                
                // 驿马
                const yimaMap = { '寅': '申', '申': '寅', '巳': '亥', '亥': '巳' };
                const yimaZhi = yimaMap[pillars.year.zhi];
                if (yimaZhi && [pillars.month.zhi, pillars.day.zhi, pillars.hour.zhi].includes(yimaZhi)) {
                    shensha.push('驿马');
                }
                
                // 华盖
                const huaGaiZhi = ['辰', '戌', '丑', '未'];
                if (huaGaiZhi.includes(pillars.year.zhi) && huaGaiZhi.includes(pillars.month.zhi) && 
                    huaGaiZhi.includes(pillars.day.zhi)) {
                    shensha.push('华盖');
                }
                
                return shensha;
            }

            // ---------- 主应用 ----------
            const App = {
                init() {
                    // 切换历法
                    document.querySelectorAll('input[name="calendarType"]').forEach(radio => {
                        radio.addEventListener('change', (e) => {
                            document.getElementById('lunarLeapGroup').style.display = 
                                e.target.value === 'lunar' ? 'block' : 'none';
                        });
                    });
                    
                    // 检查夏令时
                    ['year', 'month', 'day'].forEach(id => {
                        document.getElementById(id).addEventListener('change', () => this.checkSummerTime());
                    });
                    
                    // 提交表单
                    document.getElementById('birthForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        this.calculate();
                    });
                    
                    this.checkSummerTime();
                },
                
                checkSummerTime() {
                    const year = parseInt(document.getElementById('year').value) || 1990;
                    const month = parseInt(document.getElementById('month').value) || 1;
                    const day = parseInt(document.getElementById('day').value) || 1;
                    
                    const active = TrueSolarTime.isSummerTimeActive(year, month, day);
                    
                    const infoDiv = document.getElementById('summerTimeInfo');
                    if (active) {
                        infoDiv.style.display = 'block';
                        infoDiv.innerHTML = '⚠️ 您输入的日期处于中国夏令时期间（1986-1992），系统已自动启用夏令时校正。';
                    } else {
                        infoDiv.style.display = 'none';
                    }
                },
                
                calculate() {
                    const submitBtn = document.getElementById('submitBtn');
                    const loadingInfo = document.getElementById('loadingInfo');
                    const errorInfo = document.getElementById('errorInfo');
                    
                    // 显示加载
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '⏳ 排盘中...';
                    loadingInfo.style.display = 'flex';
                    errorInfo.style.display = 'none';
                    
                    // 隐藏结果区域
                    document.getElementById('baziGrid').style.display = 'none';
                    document.getElementById('wuxingCard').style.display = 'none';
                    document.getElementById('dayunCard').style.display = 'none';
                    document.getElementById('analysisGrid').style.display = 'none';
                    
                    setTimeout(() => {
                        try {
                            // 获取输入值
                            let year = parseInt(document.getElementById('year').value);
                            let month = parseInt(document.getElementById('month').value);
                            let day = parseInt(document.getElementById('day').value);
                            let hour = parseInt(document.getElementById('hour').value);
                            let minute = parseInt(document.getElementById('minute').value);
                            const city = document.getElementById('city').value.trim();
                            const gender = document.getElementById('gender').value;
                            const calType = document.querySelector('input[name="calendarType"]:checked').value;
                            const useSummerTime = TrueSolarTime.isSummerTimeActive(year, month, day);
                            
                            // 输入验证
                            if (!city) throw new Error('请输入出生城市');
                            if (isNaN(year) || year < 1900 || year > 2100) throw new Error('年份必须在1900-2100之间');
                            if (isNaN(month) || month < 1 || month > 12) throw new Error('月份必须在1-12之间');
                            if (isNaN(day) || day < 1 || day > 31) throw new Error('日期必须在1-31之间');
                            if (isNaN(hour) || hour < 0 || hour > 23) throw new Error('小时必须在0-23之间');
                            if (isNaN(minute) || minute < 0 || minute > 59) throw new Error('分钟必须在0-59之间');
                            
                            // 农历转阳历
                            if (calType === 'lunar') {
                                if (typeof Lunar === 'undefined') throw new Error('农历库加载失败，请刷新页面');
                                
                                const isLeap = document.getElementById('lunarLeap').value === 'true';
                                let lunarDate;
                                
                                if (isLeap) {
                                    lunarDate = Lunar.fromYmdWithLeap(year, month, day, true);
                                } else {
                                    lunarDate = Lunar.fromYmd(year, month, day);
                                }
                                
                                const solar = lunarDate.getSolar();
                                year = solar.getYear();
                                month = solar.getMonth();
                                day = solar.getDay();
                            }
                            
                            // 验证公历日期有效性
                            if (!isValidDate(year, month, day)) {
                                throw new Error('公历日期无效');
                            }
                            
                            // 真太阳时校正
                            const trueTime = TrueSolarTime.calculate(year, month, day, hour, minute, city, useSummerTime);
                            
                            // 显示真太阳时信息
                            const trueTimeInfo = document.getElementById('trueTimeInfo');
                            trueTimeInfo.style.display = 'block';
                            trueTimeInfo.innerHTML = `
                                <strong>📍 真太阳时校正结果</strong><br>
                                出生城市：${escapeHtml(trueTime.city)}（东经${trueTime.longitude}°）<br>
                                经度时差：${trueTime.diffMin > 0 ? '+' : ''}${trueTime.diffMin.toFixed(1)}分钟<br>
                                <span style="color:#c2410c;font-size:1.1rem;">真太阳时：${trueTime.year}年${trueTime.month}月${trueTime.day}日 ${trueTime.hour.toString().padStart(2,'0')}:${trueTime.minute.toString().padStart(2,'0')} (${trueTime.shichen})</span>
                            `;
                            
                            // 调用iztro排盘
                            if (typeof iztro === 'undefined') throw new Error('命理库加载失败，请刷新页面');
                            
                            const dateStr = `${trueTime.year}-${trueTime.month.toString().padStart(2,'0')}-${trueTime.day.toString().padStart(2,'0')}`;
                            const astro = iztro.astro.bySolar(dateStr, trueTime.shichenName, gender === 'male' ? '男' : '女', false, 'zh-CN');
                            
                            if (!astro || !astro.fourPillar) {
                                throw new Error('排盘失败，请检查输入数据');
                            }
                            
                            const bazi = astro.fourPillar;
                            const pillars = {
                                year: { gan: bazi[0][0], zhi: bazi[0][1] },
                                month: { gan: bazi[1][0], zhi: bazi[1][1] },
                                day: { gan: bazi[2][0], zhi: bazi[2][1] },
                                hour: { gan: bazi[3][0], zhi: bazi[3][1] }
                            };
                            
                            // 更新四柱显示
                            document.getElementById('yearGanZhi').innerText = pillars.year.gan + pillars.year.zhi;
                            document.getElementById('monthGanZhi').innerText = pillars.month.gan + pillars.month.zhi;
                            document.getElementById('dayGanZhi').innerText = pillars.day.gan + pillars.day.zhi;
                            document.getElementById('hourGanZhi').innerText = pillars.hour.gan + pillars.hour.zhi;
                            
                            document.getElementById('yearShiShen').innerText = getShiShen(pillars.day.gan, pillars.year.gan) || '年';
                            document.getElementById('monthShiShen').innerText = getShiShen(pillars.day.gan, pillars.month.gan) || '月';
                            document.getElementById('dayShiShen').innerText = '日元';
                            document.getElementById('hourShiShen').innerText = getShiShen(pillars.day.gan, pillars.hour.gan) || '时';
                            
                            // 计算五行分数
                            const wxScore = calculateWuXingScore(pillars);
                            
                            // 显示五行条
                            const wuxingBars = document.getElementById('wuxingBars');
                            wuxingBars.innerHTML = '';
                            
                            for (let wx in wxScore) {
                                const score = wxScore[wx];
                                const div = document.createElement('div');
                                div.className = 'wuxing-item';
                                div.innerHTML = `
                                    <span style="font-weight:600;width:30px;">${wx}</span>
                                    <progress value="${score}" max="8"></progress>
                                    <span style="min-width:45px;">${score.toFixed(1)}分</span>
                                `;
                                wuxingBars.appendChild(div);
                            }
                            
                            // 计算神煞
                            const shensha = calculateShenSha(pillars);
                            
                            // 显示神煞标签
                            const shenshaTags = document.getElementById('shenshaTags');
                            shenshaTags.innerHTML = shensha.map(s => `<span class="shensha-tag">${s}</span>`).join('');
                            
                            // 大运数据
                            const dayunBody = document.getElementById('dayunBody');
                            dayunBody.innerHTML = '';
                            
                            if (astro.daYun && astro.daYun.length > 0) {
                                astro.daYun.forEach((dy, index) => {
                                    const ganzhi = dy.ganZhi || dy.ganzhi || this.getDefaultGanZhi(index);
                                    const startAge = dy.startAge || dy.start_age || (index * 10 + 8);
                                    const startYear = dy.startYear || dy.start_year || (trueTime.year + startAge - 1);
                                    
                                    const tr = document.createElement('tr');
                                    tr.innerHTML = `<td>${ganzhi}</td><td>${startAge}岁</td><td>${startYear}年</td>`;
                                    dayunBody.appendChild(tr);
                                });
                            }
                            
                            // 流年标签
                            const currentYear = new Date().getFullYear();
                            const liunianTags = document.getElementById('liunianTags');
                            liunianTags.innerHTML = '';
                            
                            for (let i = 0; i < 10; i++) {
                                const year = currentYear + i;
                                const tag = document.createElement('span');
                                tag.className = 'shensha-tag';
                                tag.style.background = '#e6f0ff';
                                tag.innerText = year + '年';
                                liunianTags.appendChild(tag);
                            }
                            
                            // 生成分析
                            const analysis = generateFortuneAnalysis(pillars, wxScore, shensha);
                            
                            // 更新分析文本
                            document.getElementById('summaryText').innerText = analysis.summary;
                            document.getElementById('wealthText').innerText = analysis.wealth;
                            document.getElementById('careerText').innerText = analysis.career;
                            document.getElementById('marriageText').innerText = analysis.marriage;
                            document.getElementById('childrenText').innerText = analysis.children;
                            document.getElementById('healthText').innerText = analysis.health;
                            document.getElementById('parentsText').innerText = analysis.parents;
                            document.getElementById('houseText').innerText = analysis.house;
                            document.getElementById('legalText').innerText = analysis.legal;
                            document.getElementById('travelText').innerText = analysis.travel;
                            document.getElementById('personalityText').innerText = analysis.personality;
                            document.getElementById('virtueText').innerText = analysis.virtue;
                            
                            // 显示所有结果
                            document.getElementById('baziGrid').style.display = 'grid';
                            document.getElementById('wuxingCard').style.display = 'block';
                            document.getElementById('dayunCard').style.display = 'block';
                            document.getElementById('analysisGrid').style.display = 'grid';
                            
                            errorInfo.style.display = 'none';
                            
                        } catch (e) {
                            console.error('排盘错误:', e);
                            errorInfo.style.display = 'block';
                            errorInfo.innerHTML = `❌ 错误：${escapeHtml(e.message)}`;
                        } finally {
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = '🔮 开始排盘 · 真太阳时校正';
                            loadingInfo.style.display = 'none';
                        }
                    }, 100);
                },
                
                getDefaultGanZhi(index) {
                    const gans = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
                    const zhis = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
                    return gans[index % 10] + zhis[index % 12];
                }
            };
            
            // 辅助函数
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // 启动应用
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => App.init());
            } else {
                App.init();
            }
        })();
    </script>
</body>
</html>
