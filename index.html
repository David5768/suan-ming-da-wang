<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>命理八字全息排盘系统</title>
<style>
body{margin:0;background:#f8f9fc;font-family:PingFang SC,Arial,sans-serif;}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:36px 0 24px;text-align:center;border-radius:0 0 26px 26px;}
.container{max-width:1200px;margin:32px auto 0 auto;padding:18px 8px;}
.calculator,.results{margin-bottom:32px;}
.calculator{background:#fff;box-shadow:0 2px 16px rgba(60,60,100,0.06);padding:32px;border-radius:11px;}
.results{background:#fff;box-shadow:0 2px 24px rgba(60,60,100,0.11);padding:37px 14px;border-radius:13px;}
label{display:block;margin:9px 0 6px;font-weight:600;}
input,select{margin-bottom:10px;padding:10px 8px;border-radius:5px; border:1.2px solid #ccc;width:140px;max-width:95%;font-size:17px;}
#baziForm{display:flex;flex-wrap:wrap;gap:14px;}
#baziForm button{padding:12px 38px;font-size:18px;border:none;border-radius:6px;background:linear-gradient(120deg,#667eea,#7663e2);color:#fff;font-weight:700;margin-top:13px;cursor:pointer;}
#baziForm button:hover{background:linear-gradient(110deg,#9d79f4,#557abc);}
.error{color:#be3144;background:#fff0f1;border:1px solid #ebafbc;margin:15px 0 4px 0;padding:8px 12px;border-radius:5px;}
.bazi-table{display:flex;gap:18px;justify-content:center;margin:25px 0 20px;}
.bazi-col{background:#f6f8fc;border-radius:7px;padding:12px 6px;flex:1 1 90px;text-align:center;min-width: 98px;}
.bazi-col .pillar-label{font-weight:bold;color:#555;}
.bazi-col .pillar-top{font-size:26px;font-family:monospace;color:#795ae1;}
.bazi-col .gan{font-size:21px;}
.bazi-col .zhi{font-size:17px;}
.bazi-col .wuxing{font-size:14px;color:#48cfa5;}
.bazi-col .shishen{font-size:12px;color:#7663e1;}
.analysis-section{margin-bottom:34px;}
.analysis-section h3{color:#6054a0;margin-bottom:10px;}
.elements-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:4px;}
.element-item{background:#f8f9fa;padding:8px 4px;border-radius:5px;text-align:center;border-left:4px solid #e5e6fa;font-size:15px;}
.destiny-block{margin-bottom:22px;background:#f8f7fa;padding:18px 5px 14px 16px;border-radius:7px;border-left:5px solid #667eea;}
.destiny-block h4{margin:0 0 7px 0;color:#684ba2;}
.age-section{margin-top:5px;font-size:15px;}
.age-period{margin:2px 0;}
.age-title{color:#612ad8;font-weight:600;font-size:15px;}
.wealth-plot-container{margin:10px 0 4px 0;padding:9px 2px;background:#f2f6ff;border-radius:9px;}
#wealthChart{width:99%;min-width:250px;max-width:680px;height:127px;}
.wealth-plot-caption{text-align:center;color:#777;font-size:13.5px;margin-bottom:5px;}
.wealth-hover-label {position: absolute;background: #fffbea;color: #6b4bb0;border: 1px solid #b99bf7;padding: 8px 15px;font-size: 15px;font-weight: 500;border-radius: 7px;box-shadow: 0 2px 12px #987bc03a;z-index: 999;pointer-events:none;display:none;}
.risk-years span {display:inline-block;background:#ffecb2;color:#b97b16;padding:2px 7px;margin:1px 8px 1px 0;font-size:13.5px;border-radius:9px;}
.detail-highlight{color:#e92847;font-weight:bold;font-size:15.5px;}
.analysis-section table{width:98%;border-collapse:collapse;margin:10px 0;}
.analysis-section th,.analysis-section td{padding:8px 7px;border-bottom:1px solid #eee;}
.analysis-section th{background:#f3f3fa;}
.site-footer{text-align:center;color:#666;padding:37px 6px 13px 6px;font-size:14.5px;opacity:0.84;}
@media (max-width:820px) { #baziForm{flex-direction:column;} .container{padding:6px 2px;}}
</style>
</head>
<body>
<div class="header">
    <h1>全息命理八字大数据排盘</h1>
    <p>一键批算：财运、健康、事业、感情、家庭、子女等专业分年预测<br>医学/行业/亲情/事业/婚恋……</p>
</div>
<div class="container">
    <div class="calculator">
        <form id="baziForm" autocomplete="off">
            <label>出生年份（公历）：<input id="year" type="number" min="1880" max="2050" value="1997" required></label>
            <label>月份：<input id="month" type="number" min="1" max="12" value="8" required></label>
            <label>日期：<input id="day" type="number" min="1" max="31" value="21" required></label>
            <label>小时（0-23）：<input id="hour" type="number" min="0" max="23" value="15" required></label>
            <label>分钟（0-59）：<input id="minute" type="number" min="0" max="59" value="31" required></label>
            <label>性别：<select id="gender"><option value="male" selected>男</option><option value="female">女</option></select></label>
            <button type="submit">计算八字全息批算</button>
        </form>
        <div class="error" id="errorMessage" style="display:none;"></div>
    </div>
    <div id="loading" style="display:none;margin:23px 0;">正在排盘，请稍候…</div>
    <div class="results" id="results" style="display:none;">
        <h2>八字命盘</h2>
        <div id="baziTable"></div>
        <div id="profileSummary"></div>
        <div class="analysis-section">
            <h3>五行分布</h3><div class="elements-grid" id="elementsGrid"></div>
        </div>
        <div class="analysis-section">
            <h3>财运走势图</h3>
            <div class="wealth-plot-container">
                <div class="wealth-plot-caption">18-77岁财运分年波动，鼠标悬停可看每岁财运与重大事件</div>
                <canvas id="wealthChart" width="680" height="127"></canvas>
            </div>
            <div id="wealthYearNote"></div>
        </div>
        <div class="analysis-section" id="healthBlock"></div>
        <div class="analysis-section" id="workBlock"></div>
        <div class="analysis-section" id="loveBlock"></div>
        <div class="analysis-section" id="childBlock"></div>
        <div class="analysis-section" id="familyBlock"></div>
        <div class="analysis-section" id="conclusionBlock"></div>
    </div>
    <div class="wealth-hover-label" id="hoverTip"></div>
</div>
<script>
const TG = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'], 
      DZ = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'],
      wuxingMap = {'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水'};
const ZHI5X = {子:'水',丑:'土',寅:'木',卯:'木',辰:'土',巳:'火',午:'火',未:'土',申:'金',酉:'金',戌:'土',亥:'水'};
const TG5X = {'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'���','壬':'水','癸':'水'};

const healthTemplates = {心脏:["有波动，防心血管高危。","注意心理压力，防胸闷、心悸。","防高血压高脂。"],
肺:["秋冬过敏，防气喘、咳嗽。","远离烟粉尘与污染。"],
肝胆:["防熬夜、饮酒伤肝。","35后防脂肪肝胆结石。"],
肾脏:["补水、防结石。","注意泌尿生育健康。"],
神经系统:["30-45岁防焦虑失眠。","避免长时间用脑。"],
消化:["防肠胃炎、暴饮暴食。"],血液:["优补铁防贫血。"],骨骼:["40后骨质疏松/损伤高发。"]};

function calcGanZhi(year, month, day, hour) {
    let base = 1900, diff = year - base;
    let yearGan = (6+diff)%10, yearZhi = (0+diff)%12;
    let monthGan = (yearGan*2+month)%10, monthZhi = (2+month)%12;
    let dayIndex = Math.floor(diff*365.25 + (month-1)*30 + day)%60;
    let dayGan = dayIndex%10, dayZhi = dayIndex%12;
    let hourIndex = Math.floor((hour+1)/2)%12, hourZhi = hourIndex;
    let hourGan = (dayGan*2 + hourIndex)%10;
    return [
        {pillar:'年柱',gan:TG[yearGan],zhi:DZ[yearZhi]},
        {pillar:'月柱',gan:TG[monthGan],zhi:DZ[monthZhi]},
        {pillar:'日柱',gan:TG[dayGan],zhi:DZ[dayZhi]},
        {pillar:'时柱',gan:TG[hourGan],zhi:DZ[hourZhi]}
    ];
}
function calcWuxingStats(gzList) {
    let stat = {木:0,火:0,土:0,金:0,水:0};
    gzList.forEach(obj=>{
        stat[TG5X[obj.gan]]++;stat[ZHI5X[obj.zhi]]++;
    });
    return stat;
}
// 财运
function genWealthTrend(bazi, stat, age0, len){
    let arr = [], notes = [], peak = 2.5+stat.金/3+stat.土/3, low = 1+stat.火/3,
        cur = peak-0.6+Math.random(), keyAges = [];
    for(let i=0;i<len;i++){
        let age = age0+i, base = peak-Math.abs(Math.sin(age/8))*0.82 + (Math.random()-0.48)*0.18,mod=0;
        if(['子','午','卯','酉'].includes(bazi[i%4].zhi)) mod+=.23;
        if(bazi[i%4].gan==TG[2]||bazi[i%4].gan==TG[6]) mod+=.18;
        if(i%11===8) mod+=0.45;if(age%10===6) mod-=.42;
        if((stat.金>=3||stat.土>=3)&&i>18&&i<65) mod+=0.33;
        let riskFlag = 0;if(base+mod<1.35) {mod-=0.13;riskFlag=1;keyAges.push(age);}
        let val = Math.max(.8,Math.min(4.7,base + mod)),label='';
        if(val>3.7) label = "财运极旺，机会众多";
        else if(val>3.2) label = "财源广进，投资宜抓大势";
        else if(val>2.3) label = "财气顺畅，主业副业双收";
        else if(val>1.4) label = "财运波动，投资保守";
        else label = "低谷，避免破财，重理财";
        if(Math.random()<0.12) label+=(["合作分红","贵人提携","得财遇事","投资警报","理财得失并存","业务晋升","税务变动","商机暗藏危机"][Math.floor(Math.random()*8)]);
        arr.push(val);
        notes.push({age,desc:label,risk:riskFlag});
    }
    return {arr,notes,keyAges};
}

// 健康
function genHealthTrend(stat, bazi, age0,len){
    let diseases=["心脏","肝胆","肾脏","消化","肺","神经系统","骨骼"],riskmap=[];let wmap={木:1,火:0,土:3,金:4,水:2};
    for(let i=0;i<len;i++){
        let age=age0+i,widx=(Math.floor(i/7)+bazi[i%4].gan.charCodeAt(0))%5,
          val=stat[Object.keys(stat)[widx]]-Math.abs(i%12-6)/8+Math.random()*0.22;
        val=2.7-val;if(val<0)val=0.7;
        let disease=diseases[wmap[Object.keys(wmap)[widx]]],desc='';if(val>3.6)desc=disease+"多发期";else if(val>2.7)desc=disease+"高发风险";else if(val>2.1)desc="健康平稳"; else desc="出现体质警示";
        if(Math.random()<.14)desc+=["，易有旧疾复发。","，体虚需调理。","，外伤/感染需关注。"][Math.floor(Math.random()*3)];
        if(i==15||i==35||i==50)desc="职业压力导致"+disease+"高风险。";
        riskmap.push({age,disease,score:val,desc});
    }
    return riskmap;
}
function healthRiskYears(healthTrend){
    return healthTrend.filter(r=>r.score>3.4).sort((a,b)=>b.score-a.score).slice(0,4);}

// 事业/行业
const industryMap = {"木":["教育/医疗/心理/生态农业","出版语言/文化公益","新兴绿色经济"],"火":["科技/传媒/广告/互联网","体育演艺/美食","电子商务/时尚"],
"土":["地产/基建/养老/财务统计/管理咨询","食品/农业/仓储物流","家族企业/民生服务"],
"金":["金融/法律/证券/贸易/军警/工程高管","高科技/医械/制造行业"],"水":["航运物流/进出口/科研/社科/调解仲裁","旅游传媒/语言新媒体"]};
function workIndustrySuggest(stat, age){
    let maxW = Object.keys(stat).sort((a,b)=>stat[b]-stat[a])[0],opts = industryMap[maxW],
    msg = opts ? opts[Math.floor((age/9)%opts.length)] : "";
    let para=["勇于挑战新兴领域","注意跨界转型并重积累","稳定晋升期为主，勿冒进","科技创新/技术创业年极佳","主动扩大人脉资源"];
    return `${msg}，${para[age%para.length]}.`;
}

// 家庭/父母/养老/亲子
const familyEvents = [
"与父母关系和谐，家庭气氛良好，关键年可多寻求长辈支持。",
"家庭成员健康平安，但应多关心亲子互动。",
"有迁居、买房、装修等家庭事务，注意资产安全与分工。",
"亲子教育挑战增加，父母需关注子女心理成长。",
"家有多世代共处，长辈照看孙辈，家庭氛围温馨。",
"兄弟姐妹联系增进，有合作或财务往来。",
"居家或职业迁徙影响家庭结构，宜提前沟通规划。",
"伴侣工作变动影响家庭重要决策，保持坦诚开放。"
];
// 感情
const loveRiskEvents = [
"易有异地/跨文化恋情，适度耐心经营。",
"感情波折，正缘概率高，防三角关系。",
"互动圈扩张，桃花年易有新追求者。",
"伴侣年警惕沟通误会，避免冷战。",
"适合共建家庭或购房，提升情感稳固性。",
"合作事业带来两性新动力，易遇贵人。",
"冲动表白，感情突破快但易高开低走。",
"可能有二婚/变动期，需以自我成长为重。"
];
// 子女/家运
const childEvents = [
"子女缘分深厚，亲子支持持久。",
"子女学业或事业进展需鼓励支持。",
"适合培养兴趣特长或艺术体育。",
"升学/就职节点应多鼓励独立自主。",
"有早恋/青春叛逆苗头，耐心沟通化解。",
"有家族新丁喜庆机遇，家庭热闹祥和。",
"应多关注家人健康或角色切换。"
];
function profileSummaryBlock(gz,stat,gender){
    let maxW=Object.keys(stat).sort((a,b)=>stat[b]-stat[a])[0],minW=Object.keys(stat).sort((a,b)=>stat[a]-stat[b])[0];
    let charSummary={'火':"热情表达、主动进取。","金":"理性实干、善组织秩序。",'木':"多才喜成长、仁心温和。",'水':"机敏善变，适应多元。",'土':"稳重务实，重承诺。"};
    let suggest={'火':"锻炼耐心、注重团队。","金":"宜开放合作思维。",'木':"果断抓住机会。",'水':"定目标防分心。",'土':"主动突破守旧思维。"};
    return `<div class="destiny-block"><h4>八字五行格局分析</h4>
    <div>旺：[${maxW}${stat[maxW]}] 缺：[${minW}${stat[minW]}]，日主：${gz[2].gan}${gz[2].zhi}（${wuxingMap[gz[2].gan]}命）<br>
    性格:${charSummary[wuxingMap[gz[2].gan]]}，建议：${suggest[wuxingMap[gz[2].gan]]}<br>
    年柱：${gz[0].gan}${gz[0].zhi}，基础根基；月柱：${gz[1].gan}${gz[1].zhi}，少年顺逆；日柱主本人；时柱：${gz[3].gan}${gz[3].zhi}，子女/晚年。</div></div>`;
}

function renderBaziTable(gzList){
    let out = `<div class="bazi-table">`,pillars=['年柱','月柱','日柱','时柱'];
    for(let i=0;i<4;i++){
        out+= `<div class="bazi-col">
            <div class="pillar-label">${pillars[i]}</div>
            <div class="pillar-top"><span class="gan">${gzList[i].gan}</span><span class="zhi">${gzList[i].zhi}</span></div>
            <div class="wuxing">[${wuxingMap[gzList[i].gan]}]</div>
        </div>`;
    }out+='</div>';return out;
}
function renderWuxing(stat){
    let html = [];for(let k in stat) html.push(`<div class='element-item'><b>${k}</b><br>${stat[k]}</div>`);return html.join('');
}
// 医学风险高亮
function healthRiskDesc(age, score, disease, gender, tgi, zhi, stat){
    let baseMsg = score>3.2?"高危":(score>2.1?"中度警惕":"相对平稳"),tpl=healthTemplates[disease];
    let diseaseMsg=tpl?tpl[Math.floor(Math.random()*tpl.length)]:"体检+养生基础年";
    let zhiMsg="";if(['午','卯','辰','酉'].includes(zhi)) zhiMsg="遇马卯辰酉，免疫系统波动。";
    if(['甲','乙'].includes(tgi)) zhiMsg+="命局甲乙，40岁后防头颈疾病。";
    if(gender==='female'&&score>3.4)zhiMsg+="女性体质需关注妇科。";
    return `<div class="age-period"><span class="age-title">${age}岁：</span>${diseaseMsg} ${zhiMsg} <b style="color:#f65;">${baseMsg}</b></div>`;
}
document.getElementById("baziForm").onsubmit=function(e){
    e.preventDefault();
    let year=+document.getElementById("year").value,month=+document.getElementById("month").value,
    day=+document.getElementById("day").value,hour=+document.getElementById("hour").value,
    gender=document.getElementById("gender").value,age0=18,ageLen=60;
    document.getElementById("errorMessage").style.display="none";
    if(!(year>=1880&&year<=2050&&month>=1&&month<=12&&day>=1&&day<=31&&hour>=0&&hour<=23)){
        document.getElementById("errorMessage").style.display="";
        document.getElementById("errorMessage").innerText="请填入正确的出生时间！";
        return;}
    document.getElementById("loading").style.display="";
    setTimeout(function(){
        let gzList=calcGanZhi(year,month,day,hour),stat=calcWuxingStats(gzList),
        wealth=genWealthTrend(gzList,stat,age0,ageLen),health=genHealthTrend(stat,gzList,age0,ageLen),
        yrsRisk=healthRiskYears(health),work=genWorkTrend(stat,gzList,age0,ageLen),
        love=genLoveTrend(gzList,stat,age0,ageLen,gender),childY=genChildTrend(stat,gzList,age0,ageLen,gender);
        // 命盘/五行
        document.getElementById("baziTable").innerHTML=renderBaziTable(gzList);
        document.getElementById("profileSummary").innerHTML=profileSummaryBlock(gzList,stat,gender);
        document.getElementById("elementsGrid").innerHTML=renderWuxing(stat);
        // 财运图
        drawWealthChart("wealthChart", wealth.arr, wealth.notes, age0);
        let wNote = '<div style="margin:8px 0 4px;font-size:16px;"><b>高峰/低谷：</b>';
        let lst = [];
        for(let i=0;i<wealth.arr.length;i++)
            if(wealth.arr[i]>3.8) lst.push(age0+i+"岁(极旺)");
            else if(wealth.arr[i]<1.2) lst.push(age0+i+"岁(低谷)");
        wNote += lst.join('，');
        wNote += "<br><b>重要年份事件：</b>";for(let i=0;i<18;i++)wNote+=`<br><span class="age-title">${age0+i}岁</span>:${wealth.notes[i].desc} `;
        wNote+=`</div>`;document.getElementById("wealthYearNote").innerHTML=wNote;
        // 健康区块
        let htm = `<div class="destiny-block"><h4>健康分年风险与建议</h4><div>高危年：</div><div class="risk-years">`;
        for(const yr of yrsRisk){
            let idx = health.findIndex(x=>x.age===yr.age);
            let riskBlock=healthRiskDesc(yr.age,yr.score,yr.disease,gender,gzList[idx%4].gan,gzList[idx%4].zhi,stat);
            htm+=riskBlock;}
        htm+=`</div><div style="margin:9px 0;">各年龄健康趋势(每7年采样)：</div>`;
        for(let i=0;i<health.length;i+=7)
            htm+=healthRiskDesc(health[i].age,health[i].score,health[i].disease,gender,gzList[i%4].gan,gzList[i%4].zhi,stat);
        htm+=`</div>`;
        document.getElementById("healthBlock").innerHTML=htm;
        // 事业
        let wblock = `<div class="destiny-block"><h4>事业/行业分年趋势</h4><table><tr><th>年龄</th><th>趋势</th><th>行业建议</th></tr>`;
        for(let i=0;i<ageLen;i+=7){
            wblock+=`<tr><td>${age0+i}</td>
            <td>${work.arr[i]>2.7?"晋升期":"震荡期"}</td>
            <td>${work.notes[i].desc} ${workIndustrySuggest(stat,age0+i)}</td></tr>`;
        }wblock+=`</table><div class="age-section">`;
        for(let i=0;i<ageLen;i+=10)

        wblock+=`</div></div>`;document.getElementById("workBlock").innerHTML=wblock;
        // 感情
        let lblock = `<div class="destiny-block"><h4>姻缘/感情分年预测</h4>`;
        for(let i=0;i<ageLen;i+=10)lblock+=`<div class="age-period"><span class="age-title">${age0+i}-${age0+i+9}岁：</span>${love.notes[i].desc} ${loveRiskEvents[(age0+i)%loveRiskEvents.length]}</div>`;
        lblock+=`</div>`;document.getElementById("loveBlock").innerHTML=lblock;
        // 子女
        let cblock = `<div class="destiny-block"><h4>子女/家运关键期</h4><table><tr><th>年龄</th><th>说明</th></tr>`;
        for(let i=0;i<childY.length&&i<12;i++)cblock+=`<tr><td>${childY[i].age}</td><td>${childY[i].desc} ${childEvents[childY[i].age%childEvents.length]}</td></tr>`;
        cblock+=`</table><div class="age-section">`;

        cblock+=`</div></div>`;document.getElementById("childBlock").innerHTML = cblock;
        // 家庭
        let fblock = `<div class="destiny-block"><h4>家庭/亲情/养老全程分析</h4>`;
        for(let i=age0;i<age0+ageLen;i+=8)fblock+=`<div class="age-period"><span class="age-title">${i}-${i+7}岁：</span>${familyEvents[i%familyEvents.length]}</div>`;

        document.getElementById("conclusionBlock").innerHTML=finalConclusionBlock(stat,gzList);

// 财运曲线
function drawWealthChart(canvasId, arr,notes,age0){
    const cvs = document.getElementById(canvasId),tip=document.getElementById("hoverTip");if(!cvs) return;
    let ctx = cvs.getContext('2d');ctx.clearRect(0,0,cvs.width,cvs.height);
    let w = cvs.width, h = cvs.height, n = arr.length;
    ctx.strokeStyle="#678be2"; ctx.lineWidth=2;ctx.beginPath();
    ctx.moveTo(56,h-28); ctx.lineTo(w-12,h-28); ctx.moveTo(56,16); ctx.lineTo(56,h-28);ctx.stroke();
    ctx.beginPath();ctx.strokeStyle="#e06cb9";ctx.lineWidth=2.3;
    for(let i=0;i<n;i++){
        let x = 56+i*((w-68)/(n-1)), y = h-28-(arr[i]-0.6)*(h-49)/4.1;
        if(i===0) ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.stroke();
    for(let i=0;i<n;i++){
        let x = 56+i*((w-68)/(n-1)), y = h-28-(arr[i]-0.6)*(h-49)/4.1;
        ctx.beginPath();ctx.arc(x,y,3,0,2*Math.PI);ctx.fillStyle="#e06cb9";ctx.fill();}
    ctx.fillStyle="#444";ctx.font="13px Arial";
    for(let i=0;i<=n-1;i+=10){let x = 56+i*((w-68)/(n-1));ctx.fillText((age0+i)+"岁", x-14, h-8);}
    cvs.onmousemove = function(ev){
        const rect=cvs.getBoundingClientRect();let mx=ev.clientX-rect.left;
        let idx = Math.round((mx-56)/(w-68)*(n-1));idx = Math.max(0,Math.min(n-1,idx));
        let age=age0+idx;
        tip.style.left=(rect.left+window.scrollX+mx-60)+"px";
        tip.style.top=(rect.top+window.scrollY+h-115)+"px";
        tip.innerHTML=`<b>${age}岁 财运:${arr[idx].toFixed(2)}</b><br>${notes[idx].desc}`;
        tip.style.display="block";
    }
    cvs.onmouseleave = function(){tip.style.display="none";}
}
function finalConclusionBlock(stat,gzList){
    let arr = [], strong = v=>`<span style="color:#e92847;font-weight:700;">${v}</span>`;
    if(stat.金>=4) arr.push("金旺，金融/法律/工程/管理皆宜。注意避免刚硬易折。");
    if(stat.木>=4) arr.push("木旺，文化、学术、教育发展顺；防失方向。");
    if(stat.火>=4) arr.push("火旺，表达张扬，高峰年健康提防高血压/用眼过度。");
    if(stat.水>=4) arr.push("水旺，适合多元发展，情感敏感。");
    if(stat.土>=4) arr.push("土旺宜积累，唯需破除守旧思维。");
    if(stat.金<=1||stat.木<=1||stat.火<=1||stat.水<=1||stat.土<=1)
        arr.push(strong("五行失衡，建议多交贵人、佩戴调理饰品。"));
    arr.push(`<b>大运节律：</b> 以${wuxingMap[gzList[1].gan]}—${wuxingMap[gzList[3].gan]}波动为主，注重顺势求变。`);
    arr.push("重大人生节点结合财运/健康/事业/婚姻分年趋势并请专业师傅复核。仅供娱乐与参考！");
    return `<div class="destiny-block"><h4>全局命理解读</h4><div>${arr.join("<br>")}</div></div>`;
}

// ====== 丰富2000行：分年描述逻辑增强 START ======
function genWorkTrend(stat,bazi,age0,len){
    let arr=[],notes=[];
    const stageTxt=["起步摸索期","深耕提升期","晋升竞争期","稳步上升期","事业调整转型期"];
    for(let i=0;i<len;i++){
        let age=age0+i;
        let mod=(stat.木+stat.火-Math.abs(i%6-3))/7+(stat.金+stat.土)/15+Math.sin(i/8)*.6+Math.random()*0.14;
        let val = 1.7+mod;if(Math.random()<0.13)val-=0.21;if(Math.random()<0.08)val+=0.42;
        let sIdx = (Math.floor(i/12)+parseInt(stat.金*2.1+stat.火*1.3))%stageTxt.length;
        notes.push({age,desc:stageTxt[sIdx]});
        arr.push(val);
    }return {arr,notes};
}
function genLoveTrend(bazi,stat,age0,len,gender){
    let arr=[],notes=[],theta=gender=="male"?0.23:0.38;
    for(let i=0;i<len;i++){
       let age=age0+i,base=Math.abs(Math.sin(age*theta))*3+stat.火*0.36+(Math.random()-0.5)*0.55;
       let sTxt = ["感情上升期","情感相对低潮","缘分活跃期","波折调整期"];
       let label = sTxt[(Math.floor(i/11)+stat.水+stat.金)%sTxt.length];
       arr.push(Math.min(4.6,Math.max(0.7,base)));
       notes.push({age,desc:label});
    }return {arr,notes};
}
function genChildTrend(stat,bazi,age0,len,gender){
    let lst=[];
    for(let i=22;i<46;i++){
        let idx = (i-age0)%4,lbl='',flag=0;
        if(['卯','午','戌'].includes(bazi[idx].zhi))  {lbl='有添丁概率，亲子感情深';flag=1;}
        else if(stat.土>3&&i%3==0) {lbl='子女学业职位进展顺';flag=1;}
        else if(Math.random()<.11)lbl="家宅小风波需调和";
        if(flag||Math.random()<.04) lst.push({age:i,desc:lbl});if(lst.length>16)break;
    }return lst;
}
